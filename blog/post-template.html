<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITLE__ | 断酒でGO!! 開発ノート</title>
<style>
  :root {
    --primary: #2563eb;
    --accent: #f59e0b;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
  }
  .back-link {
    display: block;
    padding: 1rem 1.5rem;
    color: var(--primary);
    text-decoration: none;
    font-size: 0.9rem;
  }
  .back-link:hover { text-decoration: underline; }
  .container {
    max-width: 740px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
  }
  .article {
    background: var(--card);
    border-radius: 1rem;
    padding: 2.5rem 2rem;
    margin: 0.5rem auto 2rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .article h1 {
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight: 900;
    line-height: 1.5;
    color: var(--primary);
    margin-bottom: 0.6rem;
  }
  .article .meta {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.8rem;
  }
  .article h2 {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--primary);
    margin: 2.5rem 0 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 3px solid var(--accent);
  }
  .article h3 {
    font-size: 1.05rem;
    font-weight: 700;
    margin: 1.8rem 0 0.6rem;
    color: var(--text);
  }
  .article p { margin-bottom: 1.2rem; }
  .article strong { color: var(--primary); font-weight: 700; }
  .article code {
    background: #eff6ff;
    color: var(--primary);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: monospace;
  }
  .article .card {
    background: #eff6ff;
    border-left: 4px solid var(--primary);
    border-radius: 0 0.5rem 0.5rem 0;
    padding: 1rem 1.2rem;
    margin: 1.5rem 0;
  }
  .article .signature {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 2rem;
    padding-top: 1.2rem;
    border-top: 1px solid var(--border);
  }
  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .tag {
    background: #eff6ff;
    color: var(--primary);
    padding: 0.25rem 0.75rem;
    border-radius: 99px;
    font-size: 0.8rem;
  }
  footer {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.85rem;
  }
  footer a { color: var(--primary); }
  @media (max-width: 600px) {
    .article { padding: 1.8rem 1.2rem; }
  }
</style>
</head>
<body>
<a href="../" class="back-link">← 開発ノート一覧</a>
<div class="container">
  <div class="article">
    <div class="meta">__DATE__｜かもちゃん記</div>
__CONTENT__

</div>
<footer>
  <p><a href="../../">断酒でGO!!</a> — 日本全国の断酒会を一つに。心の連鎖握手。</p>
</footer>
</body>
</html>
