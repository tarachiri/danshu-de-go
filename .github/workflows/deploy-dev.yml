name: Deploy Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to danshu-de-go-dev
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEV_DEPLOY_TOKEN }}
          external_repository: tarachiri/danshu-de-go-dev
          publish_branch: gh-pages
          publish_dir: .
          cname: dev.dansyu-go.nukadokonokai.com
