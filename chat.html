<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>かもちゃんに相談する | 断酒でGO!!</title>
  <meta name="description" content="断酒でGO!!のかもちゃんに、アプリの使い方や例会情報について気軽に相談できます。">
  <style>
    :root {
      --green: #2d7a4f;
      --green-light: #e8f5ee;
      --green-mid: #4a9e6e;
      --accent: #f0a500;
      --text: #1a1a1a;
      --text-mid: #444;
      --text-muted: #888;
      --border: #d4e8db;
      --bg: #f9fbf9;
      --white: #fff;
      --radius: 16px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(45,122,79,0.10);
      --bubble-user: #2d7a4f;
      --bubble-kamo: #fff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ヘッダー */
    header {
      background: var(--green);
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header-kamo {
      font-size: 28px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 700;
    }

    .header-info p {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
    }

    .header-back {
      margin-left: auto;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
    }

    /* チャットエリア */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    /* メッセージ */
    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.kamo {
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      font-size: 24px;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.kamo .message-bubble {
      background: var(--bubble-kamo);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    .message.user .message-bubble {
      background: var(--bubble-user);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* タイピングインジケーター */
    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 入力エリア */
    .input-area {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 44px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    textarea:focus {
      border-color: var(--green);
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: var(--green);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .send-btn:hover { background: var(--green-mid); }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* ヒント */
    .hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 0 0;
    }

    /* 注意書き */
    .notice {
      background: var(--green-light);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-mid);
      text-align: center;
      margin: 0 4px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-kamo">🦆</div>
  <div class="header-info">
    <h1>かもちゃんに相談する</h1>
    <p>断酒でGO!!のアシスタント</p>
  </div>
  <a class="header-back" href="/">地図に戻る</a>
</header>

<div class="chat-area" id="chatArea">
  <div class="notice">
    例会情報の確認・アプリの使い方など、お気軽にどうぞ😊<br>
    医療的なご相談は専門家にご相談ください。
  </div>

  <div class="message kamo">
    <div class="message-avatar">🦆</div>
    <div class="message-bubble">こんにちは！かもちゃんです😊
断酒でGO!!についての質問や、例会情報の間違いなど、なんでも気軽に話しかけてね！</div>
  </div>
</div>

<div class="input-area">
  <textarea
    id="input"
    placeholder="メッセージを入力..."
    rows="1"
    aria-label="メッセージ入力"
  ></textarea>
  <button class="send-btn" id="sendBtn" aria-label="送信">
    ↑
  </button>
</div>

<script>
  const API_URL = 'https://chat.nukadokonokai.com';
  const chatArea = document.getElementById('chatArea');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let history = [];
  let isLoading = false;

  // テキストエリア自動リサイズ
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // Enterで送信、Shift+Enterで改行
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;

    if (role === 'kamo') {
      div.innerHTML = `
        <div class="message-avatar">🦆</div>
        <div class="message-bubble">${escapeHtml(text)}</div>
      `;
    } else {
      div.innerHTML = `
        <div class="message-bubble">${escapeHtml(text)}</div>
      `;
    }

    chatArea.appendChild(div);
    scrollToBottom();
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message kamo';
    div.id = 'typing';
    div.innerHTML = `
      <div class="message-avatar">🦆</div>
      <div class="message-bubble">
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    chatArea.appendChild(div);
    scrollToBottom();
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function scrollToBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  async function send() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    sendBtn.disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(-10) })
      });

      hideTyping();

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const reply = data.reply;

      addMessage('kamo', reply);
      history.push({ role: 'assistant', content: reply });

    } catch (err) {
      hideTyping();
      addMessage('kamo', 'ごめんね、うまく繋がらなかったみたい😢 もう一度試してみてね。');
      console.error(err);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
