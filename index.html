<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// QRコード生成
(function(){
  var d=document.createElement('div');
  d.style.cssText='visibility:hidden;position:absolute;';
  document.body.appendChild(d);
  new QRCode(d,{text:'https://dansyu-go.nukadokonokai.com/',width:100,height:100,colorDark:'#1a1a2e',colorLight:'#f0e8d0',correctLevel:QRCode.CorrectLevel.M});
  setTimeout(function(){
    var c=d.querySelector('canvas');
    var t=document.getElementById('sp-qr-canvas');
    if(c&&t)t.getContext('2d').drawImage(c,0,0);
    document.body.removeChild(d);
  },300);
})();

// プログレス更新関数（app.jsから呼ばれる）
window.setSplashProgress = function(percent, statusText) {
  const bar = document.getElementById('sp-progress-bar');
  const pct = document.getElementById('sp-percent');
  const st  = document.getElementById('sp-status');
  if (bar) bar.style.width = percent + '%';
  if (pct) pct.textContent = percent + '%';
  if (st && statusText) st.textContent = statusText;

  if (percent >= 100) {
    const today = new Date().toISOString().slice(0, 10);
    const agreed = localStorage.getItem('disclaimer_agreed');
    // 毎回同意ボタンを表示
    const agreeArea = document.getElementById('sp-agree-area');
    if (agreeArea) agreeArea.classList.add('visible');
  }
};

// 同意ボタン押下
function splashAgree() {
  const today = new Date().toISOString().slice(0, 10);
  localStorage.setItem('disclaimer_agreed', today);
  splashClose();
}

// スプラッシュを閉じる
function splashClose() {
  const el = document.getElementById('splash-overlay');
  if (!el) return;
  el.classList.add('fade-out');
  setTimeout(() => el.remove(), 600);
}
</script>
